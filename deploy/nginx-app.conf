server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # API → uvicorn on localhost; trailing slash on proxy_pass strips the /api prefix
    # (so /api/health → uvicorn /health, /api/optimize → uvicorn /optimize).
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root redirect → /en (default locale)
    location = / {
        return 301 /en;
    }

    # Next.js static export clean URLs: /en/demo → /en/demo.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

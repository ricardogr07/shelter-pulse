name: Deploy

on:
  workflow_call:
    inputs:
      version:
        description: "Version to deploy (without v prefix)"
        required: true
        type: string

jobs:
  deploy:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      lambda_changed: ${{ steps.detect-lambda.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "tag=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect lambda/ changes
        id: detect-lambda
        run: |
          # Find the previous tag to compare against
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found - building worker image"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            LAMBDA_CHANGES=$(git diff --name-only "$PREV_TAG" HEAD -- lambda/ || true)
            if [ -n "$LAMBDA_CHANGES" ]; then
              echo "lambda/ changed since $PREV_TAG:"
              echo "$LAMBDA_CHANGES"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "No lambda/ changes since $PREV_TAG - skipping worker build"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build and push consolidated image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: app
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/shelterpulse:v${{ steps.version.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/shelterpulse:latest

      - name: Build and push worker image
        if: steps.detect-lambda.outputs.changed == 'true'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: lambda/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/shelterpulse-worker:v${{ steps.version.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/shelterpulse-worker:latest

      - name: Ensure latest AWS CLI v2 (Express Mode commands)
        if: vars.ECS_EXPRESS_SERVICE_ARN != ''
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip.sig" -o awscliv2.zip.sig
          gpg --no-default-keyring --keyring /tmp/aws-cli.gpg \
            --keyserver hkps://keys.openpgp.org \
            --recv-keys FB5DB77FD5C118B80511ADA8A6310180E282A1C0 2>/dev/null || true
          gpg --no-default-keyring --keyring /tmp/aws-cli.gpg \
            --verify awscliv2.zip.sig awscliv2.zip 2>/dev/null || echo "::warning::GPG verification skipped (key server unavailable)"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Deploy to ECS Express Mode
        if: vars.ECS_EXPRESS_SERVICE_ARN != ''
        env:
          SERVICE_ARN: ${{ vars.ECS_EXPRESS_SERVICE_ARN }}
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/shelterpulse:v${{ steps.version.outputs.tag }}
        run: |
          aws ecs update-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --primary-container "{\"image\":\"$IMAGE\",\"containerPort\":8080}" \
            --monitor-resources DEPLOYMENT \
            --monitor-mode TEXT-ONLY

      - name: Update Lambda worker function
        if: steps.detect-lambda.outputs.changed == 'true'
        env:
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/shelterpulse-worker:v${{ steps.version.outputs.tag }}
        run: |
          aws lambda update-function-code \
            --function-name shelterpulse-worker \
            --image-uri "$IMAGE" \
            --no-cli-pager || echo "::warning::Lambda update failed (function may not exist yet)"

      - name: Summary
        run: |
          echo "### Deployed v${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ steps.ecr-login.outputs.registry }}/shelterpulse:v${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ vars.ECS_EXPRESS_SERVICE_ARN }}" ]; then
            echo "Updated ECS Express service." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ECS_EXPRESS_SERVICE_ARN not set - image pushed but no service updated." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.detect-lambda.outputs.changed }}" = "true" ]; then
            echo "Worker image: \`${{ steps.ecr-login.outputs.registry }}/shelterpulse-worker:v${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "Lambda function updated." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No lambda/ changes - worker image skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

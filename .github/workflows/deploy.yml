name: Deploy

on:
  workflow_call:
    inputs:
      version:
        description: "Version to deploy (without v prefix)"
        required: true
        type: string

jobs:
  deploy:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "tag=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push consolidated image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: app
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/shelterpulse:v${{ steps.version.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/shelterpulse:latest

      - name: Ensure latest AWS CLI v2 (Express Mode commands)
        if: vars.ECS_EXPRESS_SERVICE_ARN != ''
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip.sha256" -o awscliv2.zip.sha256
          echo "$(cat awscliv2.zip.sha256) awscliv2.zip" | sha256sum --check
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Deploy to ECS Express Mode
        if: vars.ECS_EXPRESS_SERVICE_ARN != ''
        env:
          SERVICE_ARN: ${{ vars.ECS_EXPRESS_SERVICE_ARN }}
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/shelterpulse:v${{ steps.version.outputs.tag }}
        run: |
          aws ecs update-express-gateway-service \
            --service-arn "$SERVICE_ARN" \
            --primary-container "{\"image\":\"$IMAGE\",\"containerPort\":8080}" \
            --monitor-resources DEPLOYMENT \
            --monitor-mode TEXT-ONLY

      - name: Summary
        run: |
          echo "### Deployed v${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: \`${{ steps.ecr-login.outputs.registry }}/shelterpulse:v${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ vars.ECS_EXPRESS_SERVICE_ARN }}" ]; then
            echo "Updated ECS Express service \`${{ vars.ECS_EXPRESS_SERVICE_ARN }}\`." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ \`ECS_EXPRESS_SERVICE_ARN\` variable not set — image pushed but no service updated. Create the Express service first, then set the variable." >> "$GITHUB_STEP_SUMMARY"
          fi

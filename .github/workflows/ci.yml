name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  detect:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.check.outputs.python }}
      ui: ${{ steps.check.outputs.ui }}
      docker: ${{ steps.check.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diff and set outputs
        id: check
        shell: bash
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$GITHUB_SHA")
          echo "$CHANGED"

          python=false; ui=false; docker=false

          while IFS= read -r f; do
            case "$f" in
              shelterpulse/*|tests/*|pyproject.toml|tox.ini|uv.lock|.github/actions/ci-python/*)
                python=true; docker=true ;;
              ui/*|.github/actions/ci-ui/*)
                ui=true; docker=true ;;
              Dockerfile|docker-compose.yml|.github/actions/ci-docker/*)
                docker=true ;;
            esac
          done <<< "$CHANGED"

          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "ui=$ui"        >> "$GITHUB_OUTPUT"
          echo "docker=$docker" >> "$GITHUB_OUTPUT"

  python:
    name: Python checks
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ci-python

  ui:
    name: UI checks
    needs: detect
    if: needs.detect.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ci-ui

  docker:
    name: Docker build (no push)
    needs: [detect, python, ui]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      needs.detect.outputs.docker == 'true' &&
      needs.python.result != 'failure' &&
      needs.ui.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false

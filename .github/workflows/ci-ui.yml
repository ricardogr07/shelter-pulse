name: CI — UI

on:
  push:
    paths:
      - "ui/**"
      - ".github/workflows/ci-ui.yml"
  pull_request:
    paths:
      - "ui/**"
      - ".github/workflows/ci-ui.yml"

jobs:
  ui:
    name: Type-check · Lint · Cypress
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Cypress smoke test
        uses: cypress-io/github-action@v6
        with:
          working-directory: ui
          start: npm run start
          wait-on: "http://localhost:3000"
          browser: chrome
          headless: true

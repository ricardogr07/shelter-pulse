name: CI — UI
description: Node type-check/lint/build/cypress

runs:
  using: composite
  steps:
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: ui/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ui
      run: npm ci

    - name: Type check
      shell: bash
      working-directory: ui
      run: npm run type-check

    - name: Lint
      shell: bash
      working-directory: ui
      run: npm run lint

    - name: Build
      shell: bash
      working-directory: ui
      run: npm run build

    - name: Cypress smoke test
      uses: cypress-io/github-action@f790eee7a50d9505912f50c2095510be7de06aa7 # v6
      with:
        working-directory: ui
        start: npx serve -p 3000 out
        wait-on: "http://localhost:3000"
        browser: chrome

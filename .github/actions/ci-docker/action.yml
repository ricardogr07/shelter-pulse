name: CI — Docker
description: Build and push image to GHCR with SHA tag

inputs:
  token:
    required: true
    description: GitHub token for GHCR login
  sha:
    required: true
    description: Commit SHA for image tag

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Build and push
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: .
        push: true
        tags: ghcr.io/ricardogr07/shelter-pulse:sha-${{ inputs.sha }}

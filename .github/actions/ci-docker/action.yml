name: CI — Docker
description: Build and push image to GHCR with SHA tag

inputs:
  token:
    required: true
    description: GitHub token for GHCR login
  sha:
    required: true
    description: Commit SHA for image tag

runs:
  using: composite
  steps:
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/ricardogr07/shelter-pulse:sha-${{ inputs.sha }}

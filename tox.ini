[tox]
envlist = lint, security, test, e2e
isolated_build = true
requires = tox-uv

[testenv:lint]
dependency_groups = dev
commands =
    pyrefly check shelterpulse/

[testenv:security]
dependency_groups = dev
commands =
    bandit -r shelterpulse/ -c pyproject.toml -ll

[testenv:test]
dependency_groups = dev
commands =
    pytest tests/unit/ -v --cov=shelterpulse --cov-report=term-missing {posargs}

[testenv:e2e]
dependency_groups = dev
commands =
    pytest tests/e2e/ -v {posargs}

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      target: ui
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  # Temporal services — enabled only when TEMPORAL_ENABLED=True (Jun 28 gate)
  # Start with: docker compose --profile temporal up
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    profiles:
      - temporal

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    profiles:
      - temporal
